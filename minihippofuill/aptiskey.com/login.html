<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Mini Hippo</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Modern UI CSS -->
    <link rel="stylesheet" href="css/modern-ui.css">
    
    <style>
        body {
            background-color: #ffffff;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.52), rgba(255, 255, 255, 0.52)),
                url('images/login-study-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        
        .login-card {
            background: #f3f5f8;
            border: 1px solid rgba(148, 163, 184, 0.32);
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 2.5rem;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo img {
            max-height: 60px;
            width: auto;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(102, 126, 234, 0.3);
        }
        
        .alert {
            border-radius: 0.5rem;
        }

        /* Module selector */
        .module-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .module-tab {
            border: 2px solid #e2e8f0;
            background: #fff;
            border-radius: 0.7rem;
            padding: 0.75rem 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 0.82rem;
            font-weight: 600;
            color: #64748b;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }
        .module-tab i { font-size: 1.4rem; }
        .module-tab:hover {
            border-color: #93c5fd;
            color: #1e40af;
        }
        .module-tab.active {
            border-color: #2563eb;
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e3a8a;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }
        .module-tab[data-module="vstep"].active {
            border-color: #16a34a;
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #14532d;
            box-shadow: 0 4px 10px rgba(22, 163, 74, 0.2);
        }
        .module-tab[data-module="lop_hoc"].active {
            border-color: #7c3aed;
            background: linear-gradient(135deg, #ede9fe, #ddd6fe);
            color: #4c1d95;
            box-shadow: 0 4px 10px rgba(124, 58, 237, 0.2);
        }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="images/assets/img/AdminLTELogo.png" alt="Mini Hippo Logo">
                <h3 class="mt-3 mb-0">Mini Hippo</h3>
                <p class="text-muted">Đăng nhập vào hệ thống</p>
            </div>
            
            <!-- Module selector -->
            <label class="form-label fw-semibold" style="font-size:0.82rem;">
                <i class="bi bi-grid-3x3-gap me-2"></i>Chọn module
            </label>
            <div class="module-tabs" id="module-tabs">
                <div class="module-tab active" data-module="aptis">
                    <i class="bi bi-mortarboard-fill"></i>
                    Aptis
                </div>
                <div class="module-tab" data-module="vstep">
                    <i class="bi bi-award-fill"></i>
                    VSTEP
                </div>
                <div class="module-tab" data-module="lop_hoc">
                    <i class="bi bi-people-fill"></i>
                    Lớp Học
                </div>
            </div>

            <div id="error-alert" class="alert alert-danger" style="display: none;" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span id="error-message"></span>
            </div>

            <form id="login-form">
                <input type="hidden" id="selected-module" name="module" value="aptis">
                <div class="mb-3">
                    <label for="email" class="form-label">
                        <i class="bi bi-envelope me-2"></i>Email
                    </label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        required 
                        autocomplete="email"
                        placeholder="Nhập email của bạn"
                    >
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">
                        <i class="bi bi-lock me-2"></i>Mật khẩu
                    </label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password" 
                        name="password" 
                        required 
                        autocomplete="current-password"
                        placeholder="Nhập mật khẩu"
                    >
                </div>
                
                <button type="submit" class="btn btn-primary btn-login w-100" id="login-btn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
                </button>
            </form>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Auth JS -->
    <script src="js/auth.js"></script>
    
    <script>
        // ─── Module selector ───
        // Aliases /aptis, /vstep, /lop-hoc đã thêm vào vercel.json nhưng prod
        // Vercel không match → 404. Dùng URL .html trực tiếp cho ổn định —
        // tất cả 3 file static đều phục vụ qua catch-all rewrite.
        const MODULE_LANDINGS = {
            aptis: '/home.html',
            vstep: '/vstep_bode.html',
            lop_hoc: '/lop_hoc.html'
        };
        const SELECTED_MODULE_STORAGE_KEY = 'mh_selected_module';
        const VALID_MODULES = new Set(Object.keys(MODULE_LANDINGS));

        function normalizeCourse(value) {
            return typeof value === 'string' ? value.trim().toLowerCase() : '';
        }

        function normalizeLearningProgram(value) {
            const normalized = typeof value === 'string' ? value.trim().toLowerCase() : '';
            if (normalized === 'class' || normalized === 'classroom') return 'classroom';
            if (normalized === 'aptis') return 'aptis';
            if (normalized === 'vstep') return 'vstep';
            return '';
        }

        function resolveUserCourse(user) {
            if (typeof window.resolveMiniHippoCourse === 'function') {
                return window.resolveMiniHippoCourse(user);
            }
            const course = normalizeCourse(user && user.course);
            if (course) return course;
            const program = normalizeLearningProgram(user && (user.learningProgram || user.learning_program));
            if (program === 'vstep') return 'vstep';
            if (program === 'classroom') return 'lớp học';
            if (program === 'aptis') return 'aptis';
            return '';
        }

        function normalizePath(pathname) {
            const raw = typeof pathname === 'string' ? pathname.trim().toLowerCase() : '';
            if (!raw || raw === '/') return '/';
            const withoutSlash = raw.endsWith('/') ? raw.slice(0, -1) : raw;
            return withoutSlash.endsWith('.html') ? withoutSlash.slice(0, -5) : withoutSlash;
        }

        function getSelectedModule() {
            return document.getElementById('selected-module')?.value || 'aptis';
        }

        function getStoredSelectedModule() {
            try {
                const stored = localStorage.getItem(SELECTED_MODULE_STORAGE_KEY);
                return VALID_MODULES.has(stored) ? stored : '';
            } catch (_) {
                return '';
            }
        }

        function setSelectedModule(mod) {
            const selected = VALID_MODULES.has(mod) ? mod : 'aptis';
            const input = document.getElementById('selected-module');
            if (input) input.value = selected;
            document.querySelectorAll('.module-tab').forEach((el) => {
                el.classList.toggle('active', el.dataset.module === selected);
            });
            try {
                localStorage.setItem(SELECTED_MODULE_STORAGE_KEY, selected);
            } catch (_) {}
        }

        document.querySelectorAll('.module-tab').forEach((tab) => {
            tab.addEventListener('click', () => setSelectedModule(tab.dataset.module));
        });

        function moduleForPath(pathname) {
            const path = normalizePath(pathname);
            if (path === '/') return '';
            if (path.startsWith('/vstep') || path.startsWith('/admin_vstep')) return 'vstep';
            if (path === '/lop_hoc' || path === '/lop-hoc' || path === '/buoi_hoc' || path.startsWith('/admin_lop_hoc')) {
                return 'lop_hoc';
            }
            return 'aptis';
        }

        function moduleForRedirect(redirectTarget) {
            if (!redirectTarget || redirectTarget.includes('/login')) return '';
            try {
                return moduleForPath(new URL(redirectTarget, window.location.origin).pathname);
            } catch (_) {
                return moduleForPath(String(redirectTarget).split('?')[0].split('#')[0]);
            }
        }

        function shouldUseRedirectForModule(redirectTarget, mod) {
            return Boolean(redirectTarget && moduleForRedirect(redirectTarget) === mod);
        }

        function userCanAccessModule(user, mod) {
            if (!user) return false;
            const role = String(user.role || '').toLowerCase();
            if (role === 'admin') return true;
            const course = resolveUserCourse(user);
            if (mod === 'lop_hoc') return course === 'lớp học';
            if (mod === 'aptis') return course === 'aptis' || course === 'lớp ôn thi';
            if (mod === 'vstep') return course === 'vstep';
            return false;
        }

        function moduleForUser(user) {
            // Suy ra module mặc định nếu user không nhập (hoặc đã đăng nhập sẵn)
            const stored = getStoredSelectedModule();
            if (stored && userCanAccessModule(user, stored)) return stored;
            if (!user) return 'aptis';
            if (String(user.role || '').toLowerCase() === 'admin') return 'aptis';
            const course = resolveUserCourse(user);
            if (course === 'lớp học') return 'lop_hoc';
            if (course === 'vstep') return 'vstep';
            return 'aptis';
        }

        function landingForModule(mod) {
            return MODULE_LANDINGS[mod] || '/home.html';
        }

        function showError(msg) {
            const errorAlert = document.getElementById('error-alert');
            const errorMessage = document.getElementById('error-message');
            errorMessage.textContent = msg;
            errorAlert.style.display = 'block';
        }

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const selectedModule = getSelectedModule();
            const loginBtn = document.getElementById('login-btn');
            const errorAlert = document.getElementById('error-alert');
            const errorMessage = document.getElementById('error-message');

            errorAlert.style.display = 'none';

            loginBtn.disabled = true;
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang đăng nhập...';

            try {
                const deviceId = typeof getDeviceId === 'function' ? getDeviceId() : null;
                const deviceName = typeof getDeviceName === 'function' ? getDeviceName() : navigator.userAgent;
                const deviceInfo = {
                    platform: navigator.userAgentData?.platform || navigator.platform || '',
                    language: navigator.language || '',
                    userAgent: navigator.userAgent || '',
                    screen: `${window.screen?.width || ''}x${window.screen?.height || ''}`
                };

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email, password,
                        module: selectedModule,
                        deviceId, deviceName, deviceInfo
                    })
                });

                const rawResult = await response.text();
                let result = {};

                try {
                    result = rawResult ? JSON.parse(rawResult) : {};
                } catch (parseError) {
                    throw new Error('Máy chủ API trả về dữ liệu không hợp lệ.');
                }

                if (!response.ok) {
                    throw new Error(result.error || 'Đăng nhập thất bại');
                }

                if (result.token) {
                    localStorage.setItem('auth_token', result.token);
                    if (result.refreshToken) {
                        localStorage.setItem('auth_refresh_token', result.refreshToken);
                    }
                    if (result.user) {
                        localStorage.setItem('auth_user', JSON.stringify(result.user));
                    }
                    // Khởi động timer auto-refresh token để HV không bị out khi
                    // làm bài lâu hơn 1 tiếng (Supabase JWT default 60 phút).
                    if (typeof window.startTokenRefreshTimer === 'function') {
                        try { window.startTokenRefreshTimer(); } catch (_) {}
                    }
                }

                // Validate frontend (server đã validate, đây là double-check + user-friendly fallback).
                if (!userCanAccessModule(result.user || null, selectedModule)) {
                    showError(`Tài khoản này không có quyền truy cập module ${selectedModule.toUpperCase()}.`);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = originalText;
                    return;
                }

                // Redirect về trang cũ nếu trang đó thuộc đúng module đang chọn.
                // Redirect gốc "/" không có module rõ ràng, nên dùng landing module.
                const role = String(result.user?.role || '').toLowerCase();
                const isAdmin = role === 'admin';
                let redirectTarget = '';
                if (isAdmin) {
                    redirectTarget = typeof consumePostLoginRedirect === 'function'
                        ? consumePostLoginRedirect()
                        : localStorage.getItem('post_login_redirect');
                }
                if (redirectTarget && shouldUseRedirectForModule(redirectTarget, selectedModule)) {
                    localStorage.removeItem('post_login_redirect');
                    window.location.href = redirectTarget;
                } else {
                    window.location.href = landingForModule(selectedModule);
                }

            } catch (error) {
                showError(error.message);
                loginBtn.disabled = false;
                loginBtn.innerHTML = originalText;
            }
        });

        const redirectModule = moduleForRedirect(localStorage.getItem('post_login_redirect'));
        setSelectedModule(redirectModule || getStoredSelectedModule() || getSelectedModule());

        // Check if already logged in → tự redirect đến module phù hợp
        if (localStorage.getItem('auth_token')) {
            checkAuth().then(isValid => {
                if (isValid) {
                    const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
                    const mod = moduleForUser(user);
                    setSelectedModule(mod);
                    window.location.href = landingForModule(mod);
                }
            });
        }
    </script>
    <script src="js/copy_paste_guard.js"></script>
</body>
</html>
