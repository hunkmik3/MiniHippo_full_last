<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử bài học - Mini Hippo</title>
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
        }

        .history-card {
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
        }

        .history-header {
            background: linear-gradient(135deg, #0ea5e9, #1d4ed8);
            color: #fff;
            border-radius: 1rem 1rem 0 0;
            padding: 1rem 1.25rem;
        }
    </style>
</head>

<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="mb-0"><i class="bi bi-clock-history me-2"></i>Lịch sử bài học</h3>
            <a href="home.html" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-house me-1"></i>Về trang chủ
            </a>
        </div>

        <div class="history-card bg-white">
            <div class="history-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                <div>
                    <h5 class="mb-1">Kết quả luyện tập của bạn</h5>
                    <div class="small opacity-75">Theo dõi điểm số, band và phản hồi chấm bài</div>
                </div>
                <div class="d-flex gap-2">
                    <select id="history-type-filter" class="form-select form-select-sm">
                        <option value="">Tất cả kỹ năng</option>
                        <option value="reading">Reading</option>
                        <option value="listening">Listening</option>
                        <option value="writing">Writing</option>
                        <option value="speaking">Speaking</option>
                    </select>
                    <button id="history-refresh-btn" class="btn btn-light btn-sm">
                        <i class="bi bi-arrow-clockwise"></i>
                    </button>
                </div>
            </div>

            <div class="p-3">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="text-muted small">Tổng số bài: <span id="history-total-label">—</span></div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Ngày nộp</th>
                                <th>Loại</th>
                                <th>Bộ đề</th>
                                <th>Điểm</th>
                                <th>Band</th>
                                <th>Thời gian</th>
                                <th>AI Usage</th>
                                <th>Chi tiết</th>
                            </tr>
                        </thead>
                        <tbody id="history-results-body"></tbody>
                    </table>
                </div>

                <div id="history-empty-state" class="text-center text-muted py-4" style="display:none;">
                    <i class="bi bi-inboxes fs-3 d-block mb-2"></i>
                    Bạn chưa có dữ liệu lịch sử bài học.
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/writing_auto_feedback.js"></script>
    <script src="js/lesson_history.js"></script>
</body>

</html>
